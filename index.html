<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BYbank — DDMA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* warm calm palette */
    --bg:#eaeef7; --bg2:#f4f7fc; --card:#ffffff;
    --ink:#3b372e; --ink-soft:#8b8474; --ink-faint:#b7b09e;
    --line:#efe6d4; --line-soft:#f4ecdc;

    --coral:#e0724c; --coral-soft:#f7e2d7; --coral-ink:#b9532f;
    --navy:#293681; --navy-soft:#e2e4f2;
    --blue:#4169dd; --blue-soft:#e4e9fb; --blue-ink:#2b49b0;
    --sky:#6fb0e6; --sky-soft:#e6f1fb; --sky-ink:#356e9e;
    --green:#5aa588; --green-soft:#e2f0ea; --green-ink:#2e8060;
    --mint:#7fc9a8; --mint-soft:#e5f3ec; --mint-ink:#2f8a63;
    --olive:#404d86; --olive-soft:#e4e7f4;
    --pink:#e199aa; --pink-soft:#f8e7eb; --pink-ink:#c05f76;
    --lav:#8f95d8; --lav-soft:#e7e9f8; --lav-ink:#4b52b8;
    --yellow:#e2a93f; --yellow-soft:#f7ecd0; --yellow-ink:#a17614;
    --cream:#e9ecf6;

    --radius:24px; --radius-sm:18px; --radius-xs:13px;
    --shadow:0 14px 34px -18px rgba(120,100,60,.35);
    --shadow-sm:0 6px 18px -10px rgba(120,100,60,.28);
    --font:'Manrope',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
    --font-head:'Space Grotesk','Manrope',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:var(--font); color:var(--ink);
    background:
      radial-gradient(1100px 620px at 8% -10%, #f7fafe, transparent 60%),
      radial-gradient(900px 520px at 102% 0%, #e2eaf7, transparent 58%),
      radial-gradient(700px 420px at 60% 110%, #e6f0ec, transparent 60%),
      var(--bg);
    min-height:100vh; -webkit-font-smoothing:antialiased;
  }
  .app{display:flex;min-height:100vh}
  .hi,.stat .big,.dr-name,.brand b,.panel-head .ttl,.cal-month,.meme-head .ttl{font-family:var(--font-head)}

  /* ---------- badges (reference-style circular icons) ---------- */
  .badge{display:inline-grid;place-items:center;border-radius:50%;flex-shrink:0}
  .badge svg{display:block}

  /* ---------- sidebar ---------- */
  .side{width:246px;flex-shrink:0;padding:24px 16px;display:flex;flex-direction:column;gap:4px}
  .brand{display:flex;align-items:center;gap:12px;padding:6px 10px 20px}
  .brand b{font-size:17px;letter-spacing:-.3px}
  .nav a{display:flex;align-items:center;gap:12px;padding:9px 12px;border-radius:15px;
    color:var(--ink-soft);text-decoration:none;font-size:14.5px;font-weight:550;cursor:pointer;transition:.15s}
  .nav a:hover{background:#fffdf7;color:var(--ink)}
  .nav a.on{background:var(--card);color:var(--ink);box-shadow:var(--shadow-sm)}
  .nav .lbl{margin-top:1px}

  .who-block{margin-top:auto;padding-top:14px}
  .who-title{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--ink-faint);padding:0 12px 8px}
  .who-opt{display:flex;align-items:center;gap:11px;padding:8px 12px;border-radius:15px;cursor:pointer;transition:.15s}
  .who-opt:hover{background:#fffdf7}
  .who-opt.on{background:var(--card);box-shadow:var(--shadow-sm)}
  .who-av{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:700;font-size:13px}
  .av-yulia{background:linear-gradient(135deg,#5b82e6,#3453c8)}
  .av-masha{background:linear-gradient(135deg,#eaa17f,#d9724c)}
  .av-all{background:linear-gradient(135deg,#8f97d8,#5a63c0)}
  .who-opt .nm{font-size:14px;font-weight:600}
  .who-opt .rl{font-size:11.5px;color:var(--ink-faint)}
  .who-opt .chk{margin-left:auto;color:var(--green);font-weight:700;opacity:0;transition:.15s}
  .who-opt.on .chk{opacity:1}

  /* ---------- main ---------- */
  .main{flex:1;padding:26px 34px 56px;max-width:1280px}
  .topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:26px;gap:16px}
  .hi{font-size:29px;font-weight:800;letter-spacing:-.6px;display:flex;align-items:center;gap:10px}
  .date{color:var(--ink-soft);font-size:14.5px;margin-top:5px}
  .top-actions{display:flex;align-items:center;gap:12px}
  .icon-btn{width:42px;height:42px;border-radius:14px;background:var(--card);border:0;cursor:pointer;
    box-shadow:var(--shadow-sm);display:grid;place-items:center;position:relative;transition:.15s}
  .icon-btn:hover{transform:translateY(-1px)}
  .icon-btn .dotN{position:absolute;top:8px;right:9px;width:8px;height:8px;border-radius:50%;background:var(--coral);border:2px solid var(--card)}
  .btn-add{border:0;cursor:pointer;font-family:inherit;font-weight:650;font-size:14px;color:#fff;padding:11px 18px;border-radius:14px;
    background:linear-gradient(135deg,#4169dd,#293681);box-shadow:0 8px 20px -8px rgba(41,54,129,.6);display:flex;align-items:center;gap:8px;transition:.15s}
  .btn-add:hover{transform:translateY(-1px)}

  /* stat cards */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:26px}
  .stat{background:var(--card);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);
    display:flex;flex-direction:column;gap:2px;position:relative;overflow:hidden}
  .stat .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .stat .cap{font-size:13px;font-weight:600;color:var(--ink-soft)}
  .stat .big{font-size:34px;font-weight:800;letter-spacing:-1px}
  .stat .sub{font-size:12.5px;color:var(--ink-faint)}
  .stat.accent-coral{background:linear-gradient(160deg,#fcf0e7,#ffffff 55%)}
  .stat.accent-yellow{background:linear-gradient(160deg,#faf4e2,#ffffff 55%)}
  .stat.accent-pink{background:linear-gradient(160deg,#faeaee,#ffffff 55%)}
  .stat.accent-blue{background:linear-gradient(160deg,#ebf3fa,#ffffff 55%)}
  .stat.accent-sky{background:linear-gradient(160deg,#e9f2fb,#ffffff 55%)}
  .stat.accent-cobalt{background:linear-gradient(160deg,#e7ecfb,#ffffff 55%)}
  .stat.accent-crit{background:linear-gradient(160deg,#fbe9e0,#ffffff 55%)}
  .stat.accent-mint{background:linear-gradient(160deg,#e7f3ec,#ffffff 55%)}
  .stat.flash{background:linear-gradient(160deg,#fce4d9,#ffffff 60%);box-shadow:0 0 0 2px var(--coral) inset,var(--shadow);animation:flashpulse 2.6s ease-in-out infinite}
  .stat.flash .big{color:var(--coral-ink)}
  @keyframes flashpulse{0%,100%{box-shadow:0 0 0 2px var(--coral) inset,var(--shadow)}50%{box-shadow:0 0 0 2px rgba(224,122,86,.4) inset,var(--shadow)}}

  /* two columns */
  .cols{display:grid;grid-template-columns:1.15fr .85fr;gap:20px;margin-bottom:20px}
  .panel{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px 22px 12px}
  .panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .panel-head .ttl{display:flex;align-items:center;gap:11px;font-size:16.5px;font-weight:700;letter-spacing:-.2px}
  .see{font-size:12.5px;font-weight:600;color:var(--ink-soft);background:var(--bg2);border:0;border-radius:10px;padding:7px 12px;cursor:pointer;font-family:inherit;transition:.15s}
  .see:hover{background:var(--line)}

  /* payment row */
  .prow{display:flex;align-items:center;gap:13px;padding:11px 8px;border-radius:15px;cursor:pointer;transition:.13s;position:relative}
  .prow:hover{background:var(--bg2)}
  .prow + .prow{border-top:1px solid var(--line-soft)}
  .svc-badge{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;font-weight:700;font-size:15px;flex-shrink:0}
  .prow .mid{flex:1;min-width:0}
  .prow .nm{font-size:14.5px;font-weight:650;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .prow .sm{font-size:12.5px;color:var(--ink-faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .prow .right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
  .amt{font-size:14px;font-weight:700}
  .when{font-size:11.5px;font-weight:650;padding:3px 9px;border-radius:8px}
  .when.red{background:var(--coral-soft);color:var(--coral-ink)}
  .when.today{background:var(--pink-soft);color:var(--pink-ink)}
  .when.soon{background:var(--yellow-soft);color:var(--yellow-ink)}
  .when.ok{background:var(--green-soft);color:var(--green-ink)}

  .add-inline{width:100%;border:1.5px dashed var(--line);background:transparent;color:var(--ink-soft);
    font-family:inherit;font-size:13.5px;font-weight:600;padding:11px;border-radius:14px;cursor:pointer;margin:8px 0 6px;transition:.15s}
  .add-inline:hover{border-color:var(--coral);color:var(--coral-ink);background:var(--coral-soft)}

  /* project row (right col) */
  .proj{display:flex;align-items:center;gap:13px;padding:11px 8px;border-radius:15px;cursor:pointer;transition:.13s}
  .proj:hover{background:var(--bg2)}
  .proj + .proj{border-top:1px solid var(--line-soft)}
  .proj-av{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;flex-shrink:0;position:relative}
  .own-dot{position:absolute;bottom:-3px;right:-3px;width:12px;height:12px;border-radius:50%;border:2px solid var(--card)}
  .own-dot.yulia{background:#4169dd}
  .own-dot.masha{background:#e0724c}
  .proj .mid{flex:1;min-width:0}
  .proj .nm{font-size:14.5px;font-weight:650}
  .proj .sm{font-size:12.5px;color:var(--ink-faint)}
  .nextchip{font-size:11px;font-weight:650;padding:3px 9px;border-radius:8px;white-space:nowrap}
  .nextchip.coral{background:var(--coral-soft);color:var(--coral-ink)}
  .nextchip.yellow{background:var(--yellow-soft);color:var(--yellow-ink)}
  .nextchip.blue{background:var(--blue-soft);color:var(--blue-ink)}
  .nextchip.green{background:var(--green-soft);color:var(--green-ink)}
  .nextchip.red{background:var(--coral-soft);color:var(--coral-ink)}
  .nextchip.gray{background:#f0ece2;color:var(--ink-faint)}

  /* bottom row: calendar + meme */
  .cols2{display:grid;grid-template-columns:1.4fr .6fr;gap:20px}
  .cal-wrap{display:grid;grid-template-columns:1fr .82fr;gap:20px}
  .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .cal-nav{display:flex;align-items:center;gap:6px}
  .cal-nav button{width:28px;height:28px;border-radius:9px;border:0;background:var(--bg2);cursor:pointer;color:var(--ink-soft);font-size:14px}
  .cal-month{font-size:14.5px;font-weight:700}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
  .cal-grid .dow{font-size:11px;color:var(--ink-faint);text-align:center;padding:4px 0;font-weight:600}
  .cell{aspect-ratio:1;border-radius:11px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-size:13px;cursor:pointer;position:relative;transition:.12s;gap:2px}
  .cell:hover{background:var(--bg2)}
  .cell.out{color:var(--ink-faint);opacity:.5}
  .cell.today{background:var(--coral);color:#fff;font-weight:700}
  .cell.sel{outline:2px solid var(--coral);outline-offset:-2px}
  .cell .cdot{width:5px;height:5px;border-radius:50%;background:var(--coral)}
  .cell.today .cdot{background:#fff}

  .day-detail .dd-title{font-size:13.5px;font-weight:700;margin-bottom:12px}
  .dd-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid var(--line-soft)}
  .dd-item:first-of-type{border-top:0}
  .dd-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .dd-item .nm{font-size:13.5px;font-weight:600;flex:1}
  .dd-item .am{font-size:13px;font-weight:700;color:var(--ink-soft)}
  .dd-empty{font-size:13px;color:var(--ink-faint);padding-top:8px}

  /* meme */
  .meme{background:linear-gradient(165deg,#fdf6ec,#ffffff);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;display:flex;flex-direction:column}
  .meme-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .meme-head .ttl{display:flex;align-items:center;gap:9px;font-size:15px;font-weight:700}
  .meme-body{flex:1;border-radius:16px;overflow:hidden;background:var(--cream);min-height:190px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:18px;position:relative}
  .meme-body img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
  .meme-emoji{font-size:58px;line-height:1}
  .meme-cap{font-size:14px;font-weight:600;color:var(--ink);margin-top:12px;max-width:220px}
  .meme-actions{display:flex;gap:8px;margin-top:12px}
  .meme-actions button{flex:1;border:0;cursor:pointer;font-family:inherit;font-size:12.5px;font-weight:650;padding:9px;border-radius:11px;transition:.15s}
  .m-more{background:var(--yellow-soft);color:var(--yellow-ink)}
  .m-more:hover{background:#f2e3bf}
  .m-up{background:var(--card);color:var(--ink-soft);box-shadow:var(--shadow-sm)}
  .m-up:hover{color:var(--ink)}

  .foot{margin-top:26px;text-align:center;font-size:12px;color:var(--ink-faint)}
  .foot a{color:var(--ink-soft);cursor:pointer;text-decoration:underline;text-underline-offset:2px}

  /* ---------- drawer ---------- */
  .backdrop{position:fixed;inset:0;background:rgba(59,55,46,.28);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:.25s;z-index:40}
  .backdrop.on{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100vh;width:430px;max-width:92vw;background:var(--bg2);
    box-shadow:-20px 0 50px -24px rgba(90,70,40,.5);transform:translateX(105%);transition:.28s cubic-bezier(.4,0,.2,1);
    z-index:50;overflow-y:auto;padding:24px 26px 40px}
  .drawer.on{transform:translateX(0)}
  .dr-close{position:absolute;top:20px;right:22px;width:34px;height:34px;border-radius:11px;border:0;background:var(--card);cursor:pointer;box-shadow:var(--shadow-sm);font-size:16px;color:var(--ink-soft)}
  .dr-crumb{font-size:12.5px;color:var(--ink-faint);margin-bottom:4px}
  .dr-name{font-size:24px;font-weight:800;letter-spacing:-.4px;display:flex;align-items:center;gap:12px;margin-bottom:16px}
  .dr-owner-line{display:flex;align-items:center;gap:10px;margin-bottom:18px}
  .dr-owner-line .lab{font-size:13px;color:var(--ink-soft)}
  .mini-av{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:700;font-size:12px}
  .dr-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px}
  .dr-btn{border:0;cursor:pointer;font-family:inherit;font-weight:650;font-size:13.5px;padding:12px;border-radius:14px;box-shadow:var(--shadow-sm);background:var(--card);color:var(--ink);transition:.15s;display:flex;align-items:center;justify-content:center;gap:8px}
  .dr-btn:hover{transform:translateY(-1px)}
  .dr-btn.pass{background:var(--lav-soft);color:var(--lav-ink)}
  .dr-btn.arch{background:var(--coral-soft);color:var(--coral-ink)}
  .dr-sec{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-faint);margin:6px 0 12px;font-weight:600}
  .dr-svc{background:var(--card);border-radius:16px;padding:13px 15px;margin-bottom:10px;box-shadow:var(--shadow-sm)}
  .dr-svc .r1{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .dr-svc .nm{font-size:14.5px;font-weight:700}
  .dr-svc .r2{display:flex;align-items:center;justify-content:space-between}
  .dr-svc .meta{font-size:12.5px;color:var(--ink-faint)}
  .amt-edit{display:inline-flex;align-items:center;gap:4px;font-size:13px;font-weight:700;color:var(--ink-soft)}
  .amt-in{width:70px;border:1px solid var(--line);background:var(--bg2);border-radius:9px;padding:5px 8px;font-family:inherit;font-size:13px;font-weight:700;color:var(--ink);text-align:right;-moz-appearance:textfield}
  .amt-in::-webkit-outer-spin-button,.amt-in::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .amt-in:focus{outline:2px solid var(--blue);outline-offset:-1px;background:#fff}
  .svc-del{border:0;background:transparent;color:var(--ink-faint);cursor:pointer;font-size:13px;padding:4px 7px;border-radius:8px;line-height:1}
  .svc-del:hover{background:var(--coral-soft);color:var(--coral-ink)}
  .svc-controls{display:flex;gap:7px;align-items:center;margin:8px 0 8px;flex-wrap:wrap}
  .svc-in{font-family:inherit;font-size:12.5px;border:1px solid var(--line);background:var(--bg2);border-radius:9px;padding:7px 9px;color:var(--ink)}
  .svc-in:focus{outline:2px solid var(--blue);outline-offset:-1px;background:#fff}
  .svc-st{flex:1;min-width:130px}
  .svc-dt{flex:1;min-width:120px}
  .svc-add{background:var(--card);border:1.5px dashed var(--blue);border-radius:16px;padding:14px;margin-top:6px;margin-bottom:18px;display:flex;flex-direction:column;gap:8px}
  .svc-add-title{font-size:13px;font-weight:700;color:var(--blue-ink)}
  .svc-add-row{display:flex;gap:8px}
  .svc-add-row .svc-in{flex:1;min-width:0}
  .svc-add .svc-in{width:100%}
  .svc-add-btn{border:0;cursor:pointer;font-family:inherit;font-weight:650;font-size:13.5px;padding:11px;border-radius:12px;background:linear-gradient(135deg,#4169dd,#293681);color:#fff}
  .svc-del{border:0;background:transparent;color:var(--ink-faint);cursor:pointer;font-size:13px;padding:5px 8px;border-radius:8px}
  .svc-del:hover{background:var(--coral-soft);color:var(--coral-ink)}
  .svc-primary{width:100%;border:0;cursor:pointer;font-family:inherit;font-weight:700;font-size:13.5px;padding:11px;border-radius:12px;color:#fff;transition:.15s;box-shadow:var(--shadow-sm)}
  .svc-primary:hover{filter:brightness(1.06);transform:translateY(-1px)}
  .svc-second{display:flex;gap:8px;margin-top:8px}
  .svc-second button{flex:1;border:0;cursor:pointer;font-family:inherit;font-size:12px;font-weight:650;padding:8px;border-radius:10px;background:var(--bg2);color:var(--ink-soft);transition:.15s}
  .svc-second button:hover{background:var(--line-soft);color:var(--ink)}
  .dr-note{width:100%;min-height:56px;resize:vertical;border:1px solid var(--line);background:var(--card);border-radius:12px;padding:10px 12px;font-family:inherit;font-size:13px;color:var(--ink);line-height:1.4}
  .dr-note:focus{outline:2px solid var(--blue);outline-offset:-1px}
  .tl{margin-top:8px;padding-left:6px}
  .tl-item{display:flex;gap:12px;padding-bottom:14px;position:relative}
  .tl-item:not(:last-child)::before{content:"";position:absolute;left:5px;top:16px;bottom:-2px;width:2px;background:var(--line)}
  .tl-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;margin-top:3px;border:2px solid var(--bg2)}
  .tl-body .t{font-size:13.5px;font-weight:600}
  .tl-body .d{font-size:12px;color:var(--ink-faint)}

  /* ---------- projects view ---------- */
  .toolbar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:22px}
  .search{flex:1;min-width:230px;border:1px solid var(--line);background:var(--card);border-radius:14px;padding:12px 15px;font-family:inherit;font-size:14px;color:var(--ink);box-shadow:var(--shadow-sm)}
  .search:focus{outline:2px solid var(--blue);outline-offset:-1px}
  .chips{display:flex;gap:5px;background:var(--card);padding:5px;border-radius:13px;box-shadow:var(--shadow-sm)}
  .chips button{border:0;background:transparent;font-family:inherit;cursor:pointer;font-size:13px;font-weight:600;color:var(--ink-soft);padding:8px 13px;border-radius:9px;transition:.14s}
  .chips button:hover{color:var(--ink)}
  .chips button.on{background:var(--blue-soft);color:var(--blue-ink)}
  .arch-toggle{display:flex;align-items:center;gap:7px;font-size:13.5px;font-weight:600;color:var(--ink-soft);cursor:pointer;user-select:none}
  .arch-toggle input{width:16px;height:16px;accent-color:var(--blue)}
  .pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .pcard{background:var(--card);border-radius:20px;padding:18px 20px;box-shadow:var(--shadow-sm);cursor:pointer;transition:.16s;border:2px solid transparent}
  .pcard:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:var(--blue-soft)}
  .pcard.arch{opacity:.72}
  .pc-top{display:flex;align-items:center;gap:12px;margin-bottom:6px}
  .pc-name{font-size:16.5px;font-weight:700;letter-spacing:-.2px}
  .pc-owner{font-size:12.5px;color:var(--ink-faint)}
  .pc-sub{font-size:13px;color:var(--ink-soft);margin-bottom:12px}
  .pc-tags{display:flex;flex-wrap:wrap;gap:6px}
  .row-act{border:0;cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;padding:9px 12px;border-radius:11px;flex-shrink:0;transition:.14s;margin-left:8px;white-space:nowrap}
  .row-act:hover{filter:brightness(.96);transform:translateY(-1px)}
  /* big calendar */
  .cal-head-lg{display:flex;align-items:center;gap:10px}
  .cal-head-lg button{width:34px;height:34px;border-radius:11px;border:0;background:var(--card);cursor:pointer;box-shadow:var(--shadow-sm);font-size:17px;color:var(--ink-soft)}
  .cal-head-lg #calToday{width:auto;padding:0 14px;font-size:13px;font-weight:600}
  .cal-head-lg .cal-month{min-width:150px;text-align:center;font-size:17px}
  .cal-layout{display:grid;grid-template-columns:1fr .52fr;gap:20px}
  .dowrow-lg{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px}
  .cgrid-lg{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .cell-lg{min-height:98px;border-radius:12px;background:var(--bg2);padding:7px;display:flex;flex-direction:column;gap:3px;cursor:pointer;transition:.12s;overflow:hidden}
  .cell-lg:hover{background:var(--blue-soft)}
  .cell-lg.out{background:transparent;cursor:default}
  .cell-lg.today{outline:2px solid var(--coral);outline-offset:-2px}
  .cell-lg.today .cnum{color:var(--coral-ink);font-weight:800}
  .cell-lg.sel{box-shadow:0 0 0 2px var(--blue) inset;background:var(--blue-soft)}
  .cnum{font-size:13px;font-weight:700;color:var(--ink-soft)}
  .cchip{font-size:10.5px;font-weight:600;padding:2px 6px;border-radius:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
  .cmore{font-size:10px;color:var(--ink-faint);font-weight:600;padding-left:4px}
  /* settings */
  .set-wrap{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start}
  .set-card{padding:22px 24px}
  .set-title{font-size:16px;font-weight:700;font-family:var(--font-head);margin-bottom:3px}
  .set-hint{font-size:12.5px;color:var(--ink-faint);margin-bottom:14px;line-height:1.4}
  .set-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 0;border-top:1px solid var(--line-soft)}
  .set-row.first,.set-row:first-of-type{border-top:0}
  .set-row .lbl{font-size:13.5px;font-weight:500}
  .set-in{border:1px solid var(--line);background:var(--bg2);border-radius:10px;padding:8px 11px;font-family:inherit;font-size:13px;color:var(--ink);width:150px}
  .set-in:focus{outline:2px solid var(--blue);outline-offset:-1px}
  .set-in.muted{color:var(--ink-faint);font-style:italic}
  .set-sub{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-faint);font-weight:600;margin:16px 0 4px}
  .set-row input[type=checkbox]{width:18px;height:18px;accent-color:var(--blue);cursor:pointer;flex-shrink:0}
  .set-btn{border:0;cursor:pointer;font-family:inherit;font-weight:650;font-size:13.5px;padding:10px 14px;border-radius:12px;background:var(--blue-soft);color:var(--blue-ink);transition:.15s}
  .set-btn:hover{filter:brightness(.97)}
  .set-btn.danger{background:var(--coral-soft);color:var(--coral-ink)}
  .set-btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}
  .meme-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
  .meme-thumb{position:relative;border-radius:12px;overflow:hidden;aspect-ratio:1;background:var(--bg2)}
  .meme-thumb img{width:100%;height:100%;object-fit:cover}
  .meme-thumb button{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:7px;border:0;background:rgba(20,20,30,.6);color:#fff;cursor:pointer;font-size:12px;line-height:1}
  .notif-bubble{background:var(--bg2);border-radius:12px;padding:11px 14px;margin-bottom:8px;font-size:13px;line-height:1.4}
  .notif-bubble .mention{color:var(--blue-ink);font-weight:700}
  .notif-bubble .tag{font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px;margin-right:7px}
  /* dark theme */
  body.dark{
    --bg:#12141d; --bg2:#1a1d29; --card:#1e2230;
    --ink:#e9ebf4; --ink-soft:#9aa0b8; --ink-faint:#6d7291;
    --line:#2b3142; --line-soft:#242938;
    --coral-soft:#3a2620; --yellow-soft:#37311c; --blue-soft:#212743; --sky-soft:#1b2a3a; --green-soft:#1c2e28; --mint-soft:#1c2e28; --pink-soft:#331f27; --lav-soft:#25253f; --navy-soft:#20233c; --olive-soft:#20233c; --cream:#20233c;
    --shadow:0 14px 34px -18px rgba(0,0,0,.6); --shadow-sm:0 6px 18px -10px rgba(0,0,0,.5);
  }
  body.dark{background:radial-gradient(1100px 620px at 8% -10%,#1a1e2b,transparent 60%),radial-gradient(900px 520px at 102% 0%,#161a26,transparent 58%),var(--bg)}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 20px;border-radius:13px;font-size:13.5px;font-weight:600;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.25s;z-index:100}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  .gate{position:fixed;inset:0;z-index:200;background:var(--bg);display:flex;align-items:center;justify-content:center}
  .gate[hidden]{display:none}
  .gate-card{background:var(--card);border-radius:22px;box-shadow:var(--shadow);padding:34px 32px;width:320px;max-width:88vw;text-align:center}
  .gate-logo{font-size:40px}
  .gate-title{font-family:var(--font-head);font-size:24px;font-weight:800;margin-top:6px}
  .gate-sub{color:var(--ink-soft);font-size:14px;margin:6px 0 18px}
  .gate-in{width:100%;border:1px solid var(--line);background:var(--bg2);border-radius:12px;padding:12px 14px;font-family:inherit;font-size:15px;color:var(--ink);text-align:center}
  .gate-in:focus{outline:2px solid var(--blue);outline-offset:-1px}
  .gate-btn{width:100%;margin-top:12px;border:0;cursor:pointer;font-family:inherit;font-weight:700;font-size:15px;padding:12px;border-radius:12px;color:#fff;background:linear-gradient(135deg,#4169dd,#293681)}
  .gate-err{color:var(--coral-ink);font-size:13px;font-weight:600;margin-top:10px;min-height:18px}

  @media(max-width:1080px){
    .stats{grid-template-columns:1fr 1fr}
    .cols,.cols2{grid-template-columns:1fr}
    .cal-wrap{grid-template-columns:1fr}
    .pgrid{grid-template-columns:1fr 1fr}
    .cal-layout{grid-template-columns:1fr}
  }
  @media(max-width:820px){
    .side{display:none}
    .main{padding:18px}
    .hi{font-size:24px}
  }
  @media(max-width:520px){
    .stats{grid-template-columns:1fr}
    .pgrid{grid-template-columns:1fr}
  }
</style>
</head>

/* ================= ICONS (reference-style: cream circle + soft shape) ================= */
const SHAPES = {
  house:  c=>`<path d="M12 3.4 3.7 10.7c-.45.4-.17 1.14.44 1.14H6v7.5c0 .34.27.61.6.61h3.15v-4.7c0-.34.27-.6.6-.6h3.3c.33 0 .6.26.6.6v4.7H17.4c.33 0 .6-.27.6-.61v-7.5h1.86c.6 0 .89-.75.44-1.14L12 3.4Z"/>`,

let _gid=0;
function icon(name,{size=34,circle='#e9ecf6',color='#4169dd',inner}={}){
  inner = inner||circle;
  const s = Math.round(size*0.6); const id='ig'+(_gid++);
  return `<span class="badge" style="width:${size}px;height:${size}px;background:linear-gradient(145deg,${circle},color-mix(in srgb,${circle} 32%,#fff))">
    <svg viewBox="0 0 24 24" width="${s}" height="${s}">

      <g fill="url(#${id})">${SHAPES[name](inner)}</g>

}

function defaultSettings(){return {theme:'light', digestTime:'09:00', tg:{yulia:'@yulia', masha:'@masha', token:'', yuliaChat:'', mashaChat:''}, notif:{d7:true,d3:true,d1:true,day:true,sent3:true,overdue:true,digest:true}};}
function normalizeState(s){
  if(!(s&&s.projects)) s={projects:JSON.parse(JSON.stringify(SEED)), memes:[]};
  if(!s.memes) s.memes=[];
  const d=defaultSettings();
  s.settings=Object.assign(d, s.settings||{});
  s.settings.tg=Object.assign(d.tg, s.settings.tg||{});
  s.settings.notif=Object.assign(d.notif, s.settings.notif||{});
  return s;
}
function load(){ let s=null; try{ s=JSON.parse(localStorage.getItem(STORE)); }catch(e){} return normalizeState(s); }

/* ===== Общая база (Supabase) — живая синхронизация между Юлей и Машей ===== */
let cloud=null, myLastStamp='', pushTimer=null;
function cloudConfigured(){ const c=window.BYBANK_CONFIG; return !!(c && c.url && c.key && !/ВСТАВЬ/.test(c.url) && window.supabase); }
async function cloudInit(){
  if(!cloudConfigured()) return false;
  const c=window.BYBANK_CONFIG;
  try{
    cloud=window.supabase.createClient(c.url,c.key);
    const {data,error}=await cloud.from('bybank').select('data,updated_at').eq('id',1).maybeSingle();
    if(error) throw error;
    if(data && data.data){ state=normalizeState(data.data); myLastStamp=data.updated_at||''; }
    else { await cloudPushNow(); }
    cloud.channel('bybank-row').on('postgres_changes',
      {event:'*',schema:'public',table:'bybank',filter:'id=eq.1'},
      p=>{ if(!p.new || (p.new.updated_at||'')===myLastStamp) return;
        state=normalizeState(p.new.data); myLastStamp=p.new.updated_at||'';
        refreshAll(); cloudToast('✓ Успешно'); }
    ).subscribe();
    return true;
  }catch(e){ console.warn('Supabase:', e.message||e); return false; }
}
async function cloudPushNow(){
  if(!cloud) return;
  const stamp=new Date().toISOString(); myLastStamp=stamp;
  const {error}=await cloud.from('bybank').upsert({id:1,data:state,updated_at:stamp});
  if(error) console.warn('Supabase push:', error.message);
}
function cloudPush(){ if(!cloud) return; clearTimeout(pushTimer); pushTimer=setTimeout(cloudPushNow,400); }
function cloudToast(msg){
  let t=document.getElementById('toast');
  if(!t){ t=document.createElement('div'); t.id='toast'; t.className='toast'; document.body.appendChild(t); }
  t.textContent=msg; t.classList.add('on');
  clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('on'),2600);
}

/* ================= HELPERS ================= */
const MS=86400000;
const days = end => Math.round((new Date(end)-TODAY)/MS);
function fmt(end){const d=new Date(end);return String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getFullYear()).slice(2);}
function money(n){return n? n.toLocaleString('ru-RU')+' ₽':'—';}
function plural(n,a,b,c){const m=n%10,h=n%100;return m===1&&h!==11?a:(m>=2&&m<=4&&(h<10||h>=20)?b:c);}

// active (non-archived) projects for current scope
function scopeProjects(){
  return state.projects.filter(p=>!p.archived && (curWho==='all'||p.owner===curWho));
}
function bucket(s){
  if(s.status==='paused'||s.status==='closed') return s.status;
  if(s.status==='client_paid') return 'client_paid';
  if(s.status==='waiting') return 'waiting';
  if(s.end){ const d=days(s.end); if(d<0) return 'overdue'; if(d<=7) return 'soon'; }
  return 'active';
}
function nextAction(s){
  const b=bucket(s);
  switch(b){
    case 'overdue': return {t:'Напомнить клиенту', tone:'red'};
    case 'client_paid': return {t:'Оплатить сервис', tone:'blue'};
    case 'waiting': return {t:'Ждём оплату', tone:'yellow'};
    case 'soon': return {t:'Отправить платёжку', tone:'coral'};
    case 'paused': return {t:'На паузе', tone:'gray'};
    case 'closed': return {t:'Закрыто', tone:'gray'};
    default: return {t:'Активно', tone:'green'};
  }
}
function whenLabel(d){
  if(d<0) return {t:'Просрочено', c:'red'};
  if(d===0) return {t:'Сегодня', c:'today'};
  if(d===1) return {t:'Завтра', c:'soon'};
  if(d<=7) return {t:'Через '+d+' '+plural(d,'день','дня','дней'), c:'soon'};
  return {t:'Через '+d+' '+plural(d,'день','дня','дней'), c:'ok'};
}
const svcTone = ['coral','yellow','blue','green','pink','lav'];
function svcColor(name){
  let h=0; for(const ch of name) h=(h*31+ch.charCodeAt(0))>>>0;
  const map={coral:['var(--coral-soft)','var(--coral-ink)'],yellow:['var(--yellow-soft)','var(--yellow-ink)'],
    blue:['var(--blue-soft)','var(--blue-ink)'],green:['var(--green-soft)','var(--green-ink)'],
    pink:['var(--pink-soft)','var(--pink-ink)'],lav:['var(--lav-soft)','var(--lav-ink)']};
  return map[svcTone[h%svcTone.length]];
}
// random-but-stable colourful logo per project (like app icons)
const LOGO_BG=['#f2762e','#e6274b','#2ea6f0','#28b950','#6a3ff0','#f0b800','#4169dd','#e14b8a','#12b3a6','#8b5cf0','#ef5350','#1f2430','#0ea5a0','#d64d2f'];
const LOGO_GLYPHS=['spark','clover','flower','heart','moon','peach','coin','bolt','tree','wave','drop','blob','pie','chat'];
function hash(s){let h=0;for(const c of String(s))h=(h*31+c.charCodeAt(0))>>>0;return h;}
function projLogo(p,size=38){
  const h=hash(p.id), bg=LOGO_BG[h%LOGO_BG.length], g=LOGO_GLYPHS[(h>>>4)%LOGO_GLYPHS.length], s=Math.round(size*0.56);
  return `<span class="proj-av" style="width:${size}px;height:${size}px;background:${bg};background-image:linear-gradient(150deg,rgba(255,255,255,.34),rgba(0,0,0,.18))">
    <svg viewBox="0 0 24 24" width="${s}" height="${s}" fill="#fff">${SHAPES[g]('#fff')}</svg>
    <i class="own-dot ${p.owner}"></i></span>`;
}

function allSubs(){
  const arr=[];
  scopeProjects().forEach(p=>p.subs.forEach(s=>arr.push({p,s})));
  return arr;
}

  const subs=allSubs();
  const due=subs.filter(x=>x.s.end&&days(x.s.end)===0&&x.s.status!=='paused'&&x.s.status!=='closed');
  const week=subs.filter(x=>x.s.end&&days(x.s.end)>=0&&days(x.s.end)<=7&&x.s.status!=='paused'&&x.s.status!=='closed');
  const over=subs.filter(x=>bucket(x.s)==='overdue');

    ['mint','Всего проектов',projN,'активных','folder','var(--mint-soft)','var(--mint-ink)',false],

function renderProjList(){
  const el=document.getElementById('projList');
  try{
    const list = scopeProjects().slice()
      .sort((a,b)=>a.name.localeCompare(b.name,'ru'))
      .map(p=>{
        const act=p.subs.filter(s=>s.status!=='paused'&&s.status!=='closed');
        const soonest=act.filter(s=>s.end).sort((a,b)=>days(a.end)-days(b.end))[0];

function switchView(v){
  currentView=v;
  ['home','projects','payments','calendar','settings','placeholder'].forEach(x=>{const el=document.getElementById('view-'+x);if(el)el.hidden=true;});
  if(v==='home') document.getElementById('view-home').hidden=false;
  else if(v==='projects'){ document.getElementById('view-projects').hidden=false; renderProjects(); }
  else if(v==='payments'){ document.getElementById('view-payments').hidden=false; renderPayments(); }
  else if(v==='calendar'){ document.getElementById('view-calendar').hidden=false; renderCalendarBig(); }
  else if(v==='settings'){ document.getElementById('view-settings').hidden=false; renderSettings(); }
  else { document.getElementById('view-placeholder').hidden=false; document.getElementById('phTitle').textContent=NAV_TITLE[v]||''; }
  renderChrome(); renderTop();
}
function renderChips(elId,opts,cur,onPick){
  const el=document.getElementById(elId);
  el.innerHTML=opts.map(([v,l])=>`<button class="${cur===v?'on':''}" data-v="${v}">${l}</button>`).join('');
  el.querySelectorAll('button').forEach(b=>b.onclick=()=>onPick(b.dataset.v));
}
function projectsFiltered(){
  const q=projFilter.q.trim().toLowerCase();
  return state.projects.filter(p=>{
    if(!!p.archived !== projFilter.arch) return false;
    if(projFilter.person!=='all' && p.owner!==projFilter.person) return false;
    if(projFilter.status!=='all' && !p.subs.some(s=>bucket(s)===projFilter.status)) return false;
    if(q){ const hay=(p.name+' '+p.subs.map(s=>s.svc).join(' ')).toLowerCase(); if(!hay.includes(q)) return false; }
    return true;
  }).sort((a,b)=>a.name.localeCompare(b.name,'ru'));
}
function renderProjects(){
  renderChips('projPerson',[['all','Все'],['yulia','Юля'],['masha','Маша']],projFilter.person,v=>{projFilter.person=v;renderProjects();renderTop();});
  renderChips('projStatus',[['all','Все'],['active','Активные'],['soon','Скоро'],['overdue','Просрочено'],['paused','Пауза']],projFilter.status,v=>{projFilter.status=v;renderProjects();renderTop();});
  const list=projectsFiltered();
  document.getElementById('projGrid').innerHTML = list.map(p=>{
    const b={overdue:0,soon:0,waiting:0,client_paid:0,active:0,paused:0,closed:0};
    p.subs.forEach(s=>b[bucket(s)]++);
    const act=p.subs.filter(s=>s.status!=='paused'&&s.status!=='closed');
    const soonest=act.filter(s=>s.end).sort((a,b)=>days(a.end)-days(b.end))[0];
    const tags=[];
    if(b.overdue)tags.push(`<span class="nextchip red">${b.overdue} просроч.</span>`);
    if(b.soon)tags.push(`<span class="nextchip coral">${b.soon} скоро</span>`);
    if(b.waiting)tags.push(`<span class="nextchip yellow">${b.waiting} ждём</span>`);
    if(b.client_paid)tags.push(`<span class="nextchip blue">${b.client_paid} оплатить</span>`);
    if(b.active)tags.push(`<span class="nextchip green">${b.active} активны</span>`);
    if(b.paused)tags.push(`<span class="nextchip gray">${b.paused} пауза</span>`);
    return `<div class="pcard ${p.archived?'arch':''}" data-proj="${p.id}">
      <div class="pc-top">${projLogo(p,46)}<div><div class="pc-name">${p.name}</div>
        <div class="pc-owner">${NAMES[p.owner]}${p.note?' · '+p.note:''}${p.archived?' · в архиве':''}</div></div></div>
      <div class="pc-sub">${act.length} ${plural(act.length,'сервис','сервиса','сервисов')}${soonest?' · ближайшая '+whenLabel(days(soonest.end)).t.toLowerCase():''}</div>
      <div class="pc-tags">${tags.join('')||'<span class="nextchip gray">нет сервисов</span>'}</div>
    </div>`;
  }).join('') || '<div class="dd-empty">Ничего не найдено — поменяй фильтры или поиск</div>';
}

const PAY_STATUSES=[['all','Все'],['overdue','Просрочено'],['soon','Скоро'],['waiting','Ждём'],['client_paid','Оплатить сервис'],['active','Активные'],['paused','Пауза']];
const ACT_SHORT={invoice:'📨 Платёжка',clientpaid:'💰 Оплатил',servicepaid:'✅ Оплатить',resume:'▶ Вернуть'};
const ACT_SOFT={invoice:['var(--blue-soft)','var(--blue-ink)'],clientpaid:['var(--mint-soft)','var(--mint-ink)'],servicepaid:['var(--green-soft)','var(--green-ink)'],resume:['var(--sky-soft)','var(--sky-ink)']};
function paymentsFiltered(){
  const q=payFilter.q.trim().toLowerCase(); const out=[];
  state.projects.filter(p=>!p.archived && (payFilter.person==='all'||p.owner===payFilter.person))
    .forEach(p=>p.subs.forEach((s,i)=>{
      if(payFilter.status!=='all' && bucket(s)!==payFilter.status) return;
      if(q && !(s.svc+' '+p.name).toLowerCase().includes(q)) return;
      out.push({p,s,i});
    }));
  return out.sort((a,b)=>(a.s.end?days(a.s.end):9999)-(b.s.end?days(b.s.end):9999));
}
function renderPayments(){
  renderChips('payPerson',[['all','Все'],['yulia','Юля'],['masha','Маша']],payFilter.person,v=>{payFilter.person=v;renderPayments();renderTop();});
  renderChips('payStatus',PAY_STATUSES,payFilter.status,v=>{payFilter.status=v;renderPayments();renderTop();});
  document.getElementById('payAll').innerHTML = paymentsFiltered().map(({p,s,i})=>{
    const [bg,ink]=svcColor(s.svc); const na=nextAction(s); const pa=primaryAction(s);
    const w=s.end?whenLabel(days(s.end)):null;
    let actBtn='';
    if(pa){ const [abg,aink]=ACT_SOFT[pa.act]||['var(--bg2)','var(--ink-soft)'];
      actBtn=`<button class="row-act" data-rowact="${pa.act}" data-pid="${p.id}" data-i="${i}" style="background:${abg};color:${aink}">${ACT_SHORT[pa.act]||'✓'}</button>`; }
    return `<div class="prow" data-proj="${p.id}">
      <span class="svc-badge" style="background:${bg};color:${ink}">${s.svc[0]}</span>
      <div class="mid"><div class="nm">${s.svc}</div><div class="sm">${p.name} · ${NAMES[p.owner]} · ${na.t}</div></div>
      <div class="right"><span class="amt">${money(s.amt)}</span>${w?`<span class="when ${w.c}">${w.t}</span>`:`<span class="when ok">${s.status==='paused'?'пауза':'—'}</span>`}</div>
      ${actBtn}
    </div>`;
  }).join('') || '<div class="dd-empty">Ничего не найдено</div>';
}

/* ================= BIG CALENDAR ================= */
const CB={overdue:['var(--coral-soft)','var(--coral-ink)'],soon:['var(--yellow-soft)','var(--yellow-ink)'],waiting:['var(--sky-soft)','var(--sky-ink)'],client_paid:['var(--blue-soft)','var(--blue-ink)'],active:['var(--green-soft)','var(--green-ink)']};
function calProjects(){return state.projects.filter(p=>!p.archived && (calFilter.person==='all'||p.owner===calFilter.person));}
function payByDayCal(){const m={};calProjects().forEach(p=>p.subs.forEach((s,i)=>{if(!s.end||s.status==='paused'||s.status==='closed')return;(m[s.end]=m[s.end]||[]).push({p,s,i});}));return m;}
function renderCalendarBig(){
  renderChips('calPerson',[['all','Все'],['yulia','Юля'],['masha','Маша']],calFilter.person,v=>{calFilter.person=v;renderCalendarBig();});
  const map=payByDayCal(); const y=calDate.getFullYear(), m=calDate.getMonth();

function notifPreview(){
  const st=state.settings, out=[];
  const men=o=>`<span class="mention">${st.tg[o]||'@'+o}</span>`;
  const line=(tag,tagc,text)=>`<div class="notif-bubble"><span class="tag" style="background:${tagc[0]};color:${tagc[1]}">${tag}</span>${text}</div>`;
  state.projects.filter(p=>!p.archived).forEach(p=>p.subs.forEach(s=>{
    if(s.status==='paused'||s.status==='closed'||!s.end) return;
    const d=days(s.end), who=men(p.owner);
    if(st.notif.overdue && d<0) out.push(line('⚠ Просрочено',CB.overdue, `${s.svc} — ${p.name} · ${who} · оплата была ${fmt(s.end)}`));
    else if(st.notif.day && d===0) out.push(line('🔔 Сегодня',['var(--pink-soft)','var(--pink-ink)'], `${s.svc} — ${p.name} · ${who}`));
    else if(st.notif.d1 && d===1) out.push(line('📅 Завтра',CB.soon, `${s.svc} — ${p.name} · ${who}`));
    else if(st.notif.d3 && d===3) out.push(line('📅 Через 3 дня',CB.soon, `${s.svc} — ${p.name} · ${who}`));
    else if(st.notif.d7 && d===7) out.push(line('📅 Через 7 дней',CB.soon, `${s.svc} — ${p.name} · ${who}`));
    if(st.notif.sent3 && s.status==='waiting') out.push(line('📨 Ждём оплату',['var(--sky-soft)','var(--sky-ink)'], `${s.svc} — ${p.name} · ${who} · платёжка отправлена`));
  }));

}

async function tgCall(method,params){
  const token=state.settings.tg.token; if(!token) throw new Error('вставь токен бота');
  const res=await fetch(`https://api.telegram.org/bot${token}/${method}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(params||{})});
  const j=await res.json(); if(!j.ok) throw new Error(j.description||'ошибка API'); return j.result;
}
function notifLines(){
  const st=state.settings, by={yulia:[],masha:[]};
  state.projects.filter(p=>!p.archived).forEach(p=>p.subs.forEach(s=>{
    if(s.status==='paused'||s.status==='closed'||!s.end||!by[p.owner]) return;
    const d=days(s.end); let m=null;
    if(st.notif.overdue&&d<0) m=`⚠ Просрочено: ${s.svc} — ${p.name} (было ${fmt(s.end)})`;
    else if(st.notif.day&&d===0) m=`🔔 Сегодня оплата: ${s.svc} — ${p.name}`;
    else if(st.notif.d1&&d===1) m=`📅 Завтра: ${s.svc} — ${p.name}`;
    else if(st.notif.d3&&d===3) m=`📅 Через 3 дня: ${s.svc} — ${p.name}`;
    else if(st.notif.d7&&d===7) m=`📅 Через 7 дней: ${s.svc} — ${p.name}`;
    if(m) by[p.owner].push(m);
    if(st.notif.sent3&&s.status==='waiting') by[p.owner].push(`📨 Ждём оплату: ${s.svc} — ${p.name}`);
  }));
  return by;
}

const STATUS_LABEL={active:'✅ Активно',waiting:'⏳ Ждём оплату клиента',client_paid:'💰 Клиент оплатил — оплатить сервис',
  paused:'⏸ На паузе',closed:'❌ Закрыто'};
function statusText(s){const b=bucket(s);
  if(b==='overdue')return'⚠ Просрочено';if(b==='soon')return'🟡 Скоро заканчивается';
  return STATUS_LABEL[s.status]||'✅ Активно';}
const TODAY_ISO='2026-07-01';
function todayStr(){return fmt(TODAY_ISO);}
function shiftISO(iso,{months=0,days=0}){const [y,m,d]=iso.split('-').map(Number);const dt=new Date(y,m-1+months,d+days);
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;}
function logEvent(p,svc,text){(p.history=p.history||[]).unshift({t:text,svc,d:todayStr(),who:curWho==='all'?p.owner:curWho});}
function primaryAction(s){
  if(s.status==='paused') return {label:'▶ Возобновить', bg:'linear-gradient(135deg,#6fb0e6,#356e9e)', act:'resume'};
  if(s.status==='closed') return null;
  const b=bucket(s);
  if(b==='client_paid') return {label:'✅ Оплачено — продлить цикл', bg:'linear-gradient(135deg,#5aa588,#2e8060)', act:'servicepaid'};
  if(b==='waiting')     return {label:'💰 Клиент оплатил', bg:'linear-gradient(135deg,#7fc9a8,#2f8a63)', act:'clientpaid'};
  return {label:'📨 Платёжка отправлена', bg:'linear-gradient(135deg,#4169dd,#293681)', act:'invoice'};
}
function applySubAction(p,i,act){
  const s=p.subs[i];
  if(act==='del'){ p.subs.splice(i,1); return; }
  if(!s) return;
  if(act==='invoice'){ s.status='waiting'; logEvent(p,s.svc,'📨 Платёжка отправлена'); }
  else if(act==='clientpaid'){ s.status='client_paid'; logEvent(p,s.svc,'💰 Клиент оплатил'); }
  else if(act==='servicepaid'){ const nd=s.end?shiftISO(s.end,{months:1}):null; if(nd)s.end=nd; s.status='active'; logEvent(p,s.svc,'✅ Оплачено'+(nd?', продлён до '+fmt(nd):'')); }
  else if(act==='resume'){ s.status='active'; logEvent(p,s.svc,'▶ Возобновлено'); }
  else if(act==='pause'){ s.status='paused'; logEvent(p,s.svc,'⏸ Поставлено на паузу'); }
  else if(act==='extend'){ if(s.end){ s.end=shiftISO(s.end,{days:30}); logEvent(p,s.svc,'📅 Продлено на 30 дней'); } }
}

    <textarea class="dr-note" id="drNotes" placeholder="Напр.: клиент оплатит после 10-го · не беспокоить до пн · ждёт счёт…">${p.notes||''}</textarea>
    <div class="dr-sec" style="margin-top:16px">Сервисы · ${p.subs.length}</div>
    ${p.subs.map((s,i)=>{const [bg,ink]=svcColor(s.svc);const pa=primaryAction(s);
      const opts=[['active','Активна'],['waiting','Ждём оплату клиента'],['client_paid','Клиент оплатил'],['paused','На паузе'],['closed','Закрыто']];
      return `<div class="dr-svc">
        <div class="r1"><span class="nm"><span class="svc-badge" style="width:26px;height:26px;font-size:12px;background:${bg};color:${ink};display:inline-grid;vertical-align:middle;margin-right:8px">${s.svc[0]}</span>${s.svc}</span>
          <button class="svc-del" data-act="del" data-i="${i}" title="Удалить сервис">✕</button></div>
        <div style="margin-bottom:2px"><span class="nextchip ${nextAction(s).tone}">${statusText(s)}${s.end?' · до '+fmt(s.end):''}${s.amt?' · '+money(s.amt):''}</span></div>
        <div class="svc-controls">
          <select class="svc-in svc-st" data-st="${i}">${opts.map(([v,l])=>`<option value="${v}" ${s.status===v?'selected':''}>${l}</option>`).join('')}</select>
          <input class="svc-in svc-dt" type="date" data-dt="${i}" value="${s.end||''}">
          <span class="amt-edit"><input class="amt-in" data-i="${i}" type="number" inputmode="numeric" value="${s.amt??''}" placeholder="0"> ₽</span>
        </div>
        ${pa?`<button class="svc-primary" data-act="${pa.act}" data-i="${i}" style="background:${pa.bg}">${pa.label}</button>`:''}
        <div class="svc-second">
          <button data-act="extend" data-i="${i}">📅 +30 дней</button>
          ${s.status!=='paused'?`<button data-act="pause" data-i="${i}">⏸ Пауза</button>`:''}
        </div>
      </div>`;}).join('')}
    <div class="svc-add">
      <div class="svc-add-title">＋ Подключить сервис</div>
      <input id="drNewName" class="svc-in" placeholder="Название (Ройстат, Тильда, Авито…)">
      <div class="svc-add-row">
        <input id="drNewDate" class="svc-in" type="date" title="Дата окончания">
        <input id="drNewAmt" class="svc-in" type="number" placeholder="₽ / мес">
      </div>
      <select id="drNewStatus" class="svc-in">
        <option value="active">Активна</option>
        <option value="waiting">Ждём оплату клиента</option>
        <option value="client_paid">Клиент оплатил</option>
        <option value="paused">На паузе</option>
      </select>
      <button id="drAdd" class="svc-add-btn">Добавить сервис</button>
    </div>
    <div class="dr-sec" style="margin-top:6px">История</div>
    ${hist.length? `<div class="tl">${hist.slice(0,14).map(e=>`<div class="tl-item"><span class="tl-dot" style="background:${HIST_COLOR(e.t)}"></span>
      <div class="tl-body"><div class="t">${e.t}${e.svc?' · '+e.svc:''}</div><div class="d">${e.d} · ${NAMES[e.who]||''}</div></div></div>`).join('')}</div>`
      : '<div class="dd-empty" style="padding-bottom:10px">История появится после первого действия ↑</div>'}`;
  document.getElementById('drawer').classList.add('on');
  document.getElementById('backdrop').classList.add('on');
  document.getElementById('drClose').onclick=closeDrawer;
  document.getElementById('drPass').onclick=()=>{p.owner=OTHER[p.owner];logEvent(p,'','↔ Передан ' + NAMES[p.owner]);save();renderAll();openDrawer(id);};
  document.getElementById('drArch').onclick=()=>{p.archived=!p.archived;save();closeDrawer();renderAll();};
  const dr=document.getElementById('drawer');
  const notesEl=document.getElementById('drNotes'); if(notesEl) notesEl.addEventListener('change',()=>{p.notes=notesEl.value;save();});
  dr.querySelectorAll('.amt-in').forEach(inp=>inp.addEventListener('change',()=>{
    const v=parseInt(inp.value,10); const s=p.subs[+inp.dataset.i]; s.amt=isNaN(v)?null:v;
    save(); renderStats(); renderPayList(); renderProjList(); renderCalendar();
    const chip=inp.closest('.dr-svc').querySelector('.nextchip');
    if(chip) chip.outerHTML=`<span class="nextchip ${nextAction(s).tone}">${statusText(s)}${s.end?' · до '+fmt(s.end):''}${s.amt?' · '+money(s.amt):''}</span>`;
  }));
  dr.querySelectorAll('.svc-st').forEach(sel=>sel.addEventListener('change',()=>{
    p.subs[+sel.dataset.st].status=sel.value; save(); renderAll(); openDrawer(id);
  }));
  dr.querySelectorAll('.svc-dt').forEach(inp=>inp.addEventListener('change',()=>{
    p.subs[+inp.dataset.dt].end=inp.value||null;
    save(); renderStats(); renderPayList(); renderProjList(); renderCalendar();
    const chip=inp.closest('.dr-svc').querySelector('.nextchip');
    const s=p.subs[+inp.dataset.dt];
    if(chip) chip.outerHTML=`<span class="nextchip ${nextAction(s).tone}">${statusText(s)}${s.end?' · до '+fmt(s.end):''}${s.amt?' · '+money(s.amt):''}</span>`;
  }));
  dr.querySelectorAll('button[data-act]').forEach(b=>b.addEventListener('click',()=>{
    applySubAction(p,+b.dataset.i,b.dataset.act); save(); renderAll(); openDrawer(id);
  }));
  const addBtn=document.getElementById('drAdd');
  if(addBtn) addBtn.onclick=()=>{
    const nmEl=document.getElementById('drNewName'); const nm=nmEl.value.trim();
    if(!nm){ nmEl.focus(); return; }
    const am=parseInt(document.getElementById('drNewAmt').value,10);
    p.subs.push({svc:nm, amt:isNaN(am)?null:am, end:document.getElementById('drNewDate').value||null, status:document.getElementById('drNewStatus').value, history:[]});
    logEvent(p,nm,'➕ Сервис подключён');
    save(); renderAll(); openDrawer(id);
  };
}
function addProject(){
  const name=prompt('Название нового проекта (клиента):'); if(!name||!name.trim())return;
  const owner=curWho==='all'?'yulia':curWho;
  const id='p'+hash(name.trim()+state.projects.length);
  state.projects.push({id, name:name.trim(), owner, archived:false, subs:[]});
  save(); renderAll(); openDrawer(id);
}
function closeDrawer(){document.getElementById('drawer').classList.remove('on');document.getElementById('backdrop').classList.remove('on');}

/* ================= WIRE ================= */
function renderAll(){renderChrome();renderTop();renderStats();renderPayList();renderProjList();renderCalendar();if(currentView==='projects')renderProjects();if(currentView==='payments')renderPayments();if(currentView==='calendar')renderCalendarBig();}
document.getElementById('whoList').addEventListener('click',e=>{
  const o=e.target.closest('.who-opt'); if(!o)return; curWho=o.dataset.who; selDay='2026-07-01'; renderAll();
});
document.body.addEventListener('click',e=>{
  const rowAct=e.target.closest('[data-rowact]');
  if(rowAct){ const p=state.projects.find(x=>x.id===rowAct.dataset.pid); if(p){applySubAction(p,+rowAct.dataset.i,rowAct.dataset.rowact);save();renderAll();} return; }
  const row=e.target.closest('[data-proj]'); if(row){openDrawer(row.dataset.proj);return;}
  const cell=e.target.closest('[data-day]'); if(cell){selDay=cell.dataset.day;renderCalendar();if(currentView==='calendar')renderCalendarBig();}
});
document.getElementById('calPrev').onclick=()=>{calDate=new Date(calDate.getFullYear(),calDate.getMonth()-1,1);renderCalendar();};
document.getElementById('calNext').onclick=()=>{calDate=new Date(calDate.getFullYear(),calDate.getMonth()+1,1);renderCalendar();};
document.getElementById('backdrop').onclick=closeDrawer;
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDrawer();});
document.getElementById('memeMore').onclick=()=>{const n=memePool().length;if(!n)return;memeIdx=(memeIdx+1)%n;renderMeme();};
document.getElementById('memeUp').onclick=()=>document.getElementById('memeFile').click();
document.getElementById('memeFile').onchange=e=>{
  const f=e.target.files[0]; if(!f)return; const r=new FileReader();
  r.onload=()=>{state.memes.push(r.result);save();memeIdx=memePool().length-1;renderMeme();};
  r.readAsDataURL(f);
};
document.getElementById('reset').onclick=()=>{localStorage.removeItem(STORE);state=load();curWho='yulia';currentView='home';switchView('home');renderMeme();};
document.getElementById('seeAllProj').onclick=()=>switchView('projects');
document.querySelector('.btn-add').onclick=addProject;
document.querySelectorAll('.add-inline').forEach(b=>b.onclick=addProject);
// nav tab switching
document.getElementById('nav').addEventListener('click',e=>{const a=e.target.closest('a[data-view]');if(!a)return;switchView(a.dataset.view);});
// projects view filters
document.getElementById('projSearch').addEventListener('input',e=>{projFilter.q=e.target.value;renderProjects();renderTop();});
document.getElementById('projArch').addEventListener('change',e=>{projFilter.arch=e.target.checked;renderProjects();renderTop();});
document.getElementById('seeAllPay').onclick=()=>switchView('payments');
document.getElementById('paySearch').addEventListener('input',e=>{payFilter.q=e.target.value;renderPayments();renderTop();});
document.getElementById('calPrevLg').onclick=()=>{calDate=new Date(calDate.getFullYear(),calDate.getMonth()-1,1);renderCalendarBig();};
document.getElementById('calNextLg').onclick=()=>{calDate=new Date(calDate.getFullYear(),calDate.getMonth()+1,1);renderCalendarBig();};
document.getElementById('calToday').onclick=()=>{calDate=new Date(2026,6,1);selDay='2026-07-01';renderCalendarBig();renderCalendar();};

// section header icons
document.getElementById('ic-pay').outerHTML  = icon('wallet',{size:30,circle:'var(--sky-soft)',color:'var(--sky-ink)'});
document.getElementById('ic-proj').outerHTML = icon('folder',{size:30,circle:'var(--blue-soft)',color:'var(--blue)'});
document.getElementById('ic-cal').outerHTML  = icon('cal',{size:30,circle:'var(--mint-soft)',color:'var(--mint-ink)'});
document.getElementById('ic-meme').outerHTML = icon('clover',{size:30,circle:'var(--coral-soft)',color:'var(--coral)'});

function startApp(){
  applyTheme();
  renderAll();
  memeIdx=dayIndex();
  renderMeme();
  // подключаем общую базу (если заполнен config.js) — потом перерисовываем свежими данными
  cloudInit().then(ok=>{ if(ok){ refreshAll(); cloudToast('☁️ Общая база подключена'); } });
}
// Пароль на вход (задаётся в config.js). Если пароля нет — вход свободный.
(function bootGate(){
  const pass = window.BYBANK_CONFIG && window.BYBANK_CONFIG.password;
  const gate = document.getElementById('gate');
  if(!pass){ startApp(); return; }
  if(sessionStorage.getItem('bybank-gate')==='ok'){ startApp(); return; }
  gate.hidden=false;
  const submit=()=>{
    if(document.getElementById('gatePass').value===pass){
      sessionStorage.setItem('bybank-gate','ok'); gate.hidden=true; startApp();
    } else { document.getElementById('gateErr').textContent='Неверный пароль'; }
  };
  document.getElementById('gateBtn').onclick=submit;
  document.getElementById('gatePass').addEventListener('keydown',e=>{ if(e.key==='Enter') submit(); });
  document.getElementById('gatePass').focus();
})();
</script>
</body>
